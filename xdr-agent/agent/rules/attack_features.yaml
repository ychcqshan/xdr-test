rules:
  - name: "PsExec Detection"
    pattern: "psexec"
    severity: "HIGH"
  - name: "Mimikatz Detection"
    pattern: "mimikatz|sekurlsa|logonpasswords"
    severity: "CRITICAL"
  - name: "Encoded PowerShell"
    pattern: "powershell.*-enc|powershell.*-encodedcommand"
    severity: "MEDIUM"
  - name: "WMI Lateral Movement"
    pattern: "wmic.*process.*call.*create"
    severity: "HIGH"
  - name: "Cobalt Strike / Beacon"
    pattern: "spawnas|inject|shinject"
    severity: "CRITICAL"
