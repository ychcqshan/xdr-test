server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: asset-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/assets/**,/api/v1/heartbeat/**

        - id: baseline-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/baselines/**

        - id: threat-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/alerts/**,/api/v1/events/**

        - id: policy-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/policies/**

        - id: upgrade-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/upgrades/**

        - id: compliance-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/compliance/**

  codec:
    max-in-memory-size: 10MB

jwt:
  secret: Y3lYZHJQbGF0Zm9ybVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjIwMjY=
  exclude-paths: "/api/v1/auth/login,/api/v1/auth/agent/register,/api/v1/heartbeat,/api/v1/events,/api/v1/events/**,/api/v1/assets/**/user-info"

logging:
  level:
    org.springframework.cloud.gateway: debug
